<!DOCTYPE html>
<html>
<head>
    <title>IASW - Intake Form</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2>Intelligent Account Servicing Workflow (IASW)</h2>
        <h3>Staff Intake Form - Legal Name Change</h3>

        <form action="/submit_request" method="POST" enctype="multipart/form-data">

            <label>Customer ID:</label>
            <input type="text" name="customer_id" required>

            <label>Old Name:</label>
            <input type="text" name="old_name" required>

            <label>New Name:</label>
            <input type="text" name="new_name" required>

            <label>Upload Marriage Certificate (Image/PDF):</label>
            <input type="file" name="document" required>

            <button type="submit">Submit Request</button>
        </form>
    <br>
        <a href="/checker">Go to Checker Dashboard</a>
    </div>
</body>
</html>
